<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quiz com IA</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6fb;
      color: #172033;
    }

    header, main {
      max-width: 850px;
      margin: auto;
      padding: 20px;
    }

    .caixa {
      background: white;
      padding: 25px;
      border-radius: 20px;
      margin-bottom: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 42px;
    }

    input {
      width: 100%;
      padding: 14px;
      font-size: 17px;
      border-radius: 12px;
      border: 1px solid #d9deea;
      box-sizing: border-box;
      margin-top: 10px;
    }

    button {
      margin-top: 15px;
      padding: 12px 18px;
      border: none;
      border-radius: 999px;
      background: #355cff;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #243fd8;
    }

    .certo {
      color: green;
      font-weight: bold;
    }

    .errado {
      color: red;
      font-weight: bold;
    }

    .normal {
      color: #687085;
    }

    .qr {
      width: 220px;
      height: 220px;
      border: 1px solid #ddd;
      border-radius: 18px;
    }
  </style>
</head>

<body>
  <header>
    <div class="caixa">
      <h1>Quiz com IA</h1>
      <p>Escreve a resposta. A inteligência artificial vai corrigir mesmo que escrevas de outra forma.</p>
      <p><strong>Pontuação:</strong> <span id="pontuacao">0 certas em 0 respondidas</span></p>
      <button onclick="recomecarQuiz()">Recomeçar quiz</button>
    </div>
  </header>

  <main>
    <div class="caixa">
      <h2 id="pergunta"></h2>

      <input id="respostaAluno" placeholder="Escreve a tua resposta aqui">

      <button onclick="corrigirResposta()">Corrigir com IA</button>

      <p id="resultado" class="normal"></p>
    </div>

    <div class="caixa">
      <h2>Abrir por QR Code</h2>
      <p>Aponta a câmara do telemóvel para abrir este quiz.</p>

      <img
        class="qr"
        src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://vasco-sketch.github.io/Quizz/"
        alt="QR Code do quiz"
      >
    </div>
  </main>

  <script>
    const WORKER_URL = "https://raspy-breeze-9620.vascomoreiramail19.workers.dev/";

    const perguntas = [
      {
        pergunta: "Qual é a capital de Portugal?",
        respostaCerta: "Lisboa"
      },
      {
        pergunta: "Quem descobriu o Brasil?",
        respostaCerta: "Pedro Álvares Cabral"
      },
      {
        pergunta: "Qual é o maior planeta do Sistema Solar?",
        respostaCerta: "Júpiter"
      }
    ];

    let perguntaAtual = 0;
    let respondidas = {};
    let certas = 0;

    function mostrarPergunta() {
      document.getElementById("pergunta").textContent =
        perguntas[perguntaAtual].pergunta;

      document.getElementById("respostaAluno").value = "";
      document.getElementById("resultado").textContent = "";
      document.getElementById("resultado").className = "normal";
    }

    async function corrigirResposta() {
      const respostaAluno = document.getElementById("respostaAluno").value.trim();
      const resultado = document.getElementById("resultado");

      if (!respostaAluno) {
        resultado.textContent = "Escreve uma resposta primeiro.";
        resultado.className = "errado";
        return;
      }

      if (respondidas[perguntaAtual]) {
        resultado.textContent = "Já respondeste a esta pergunta.";
        resultado.className = "normal";
        return;
      }

      resultado.textContent = "A corrigir com IA...";
      resultado.className = "normal";

      try {
        const resposta = await fetch(WORKER_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            pergunta: perguntas[perguntaAtual].pergunta,
            respostaCerta: perguntas[perguntaAtual].respostaCerta,
            respostaAluno: respostaAluno
          })
        });

        const dados = await resposta.json();

        respondidas[perguntaAtual] = true;

        if (dados.certa) {
          certas++;
          resultado.textContent = "Certo! " + dados.feedback;
          resultado.className = "certo";
        } else {
          resultado.textContent = "Errado. " + dados.feedback;
          resultado.className = "errado";
        }

        atualizarPontuacao();

        setTimeout(() => {
          if (perguntaAtual < perguntas.length - 1) {
            perguntaAtual++;
            mostrarPergunta();
          } else {
            resultado.textContent += " Fim do quiz!";
          }
        }, 2500);

      } catch (erro) {
        resultado.textContent = "Erro ao contactar a IA.";
        resultado.className = "errado";
      }
    }

    function atualizarPontuacao() {
      const totalRespondidas = Object.keys(respondidas).length;

      document.getElementById("pontuacao").textContent =
        `${certas} certas em ${totalRespondidas} respondidas`;
    }

    function recomecarQuiz() {
      perguntaAtual = 0;
      respondidas = {};
      certas = 0;
      atualizarPontuacao();
      mostrarPergunta();
    }

    mostrarPergunta();
  </script>
</body>
</html>
